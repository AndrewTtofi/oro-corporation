# Dev overlay — start with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Adds mailpit (catches outbound mail) and minio (S3-compatible local storage).
# Disables Caddy's auto-HTTPS in favor of plain HTTP for localhost iteration.

services:
  proxy:
    environment:
      ORO_DOMAIN: localhost
    ports:
      - "80:80"

  web:
    environment:
      NODE_ENV: development
      SEED_ON_BOOT: "true"
      EMAIL_DRIVER: smtp
      SMTP_HOST: mail
      SMTP_PORT: 1025
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started

  worker:
    environment:
      NODE_ENV: development

  mail:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Mailpit web UI
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8025 > /dev/null"]
      interval: 30s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: oro_dev
      MINIO_ROOT_PASSWORD: oro_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  minio_data:
