name: diag-login

# One-off read-only diagnostic: dump prod user rows (role, emailVerified,
# deactivated, hash alg) and test the demo password against the live argon2,
# to root-cause "can't login". No writes. Manual trigger only.

on:
  workflow_dispatch:

concurrency:
  group: diag-login
  cancel-in-progress: false

jobs:
  diag:
    name: Diagnose login (self-hosted → 10.50.40.100)
    runs-on: [self-hosted, oro-ci]
    steps:
      - name: Inspect users over the private network
        env:
          ORO_DEPLOY_KEY: ${{ secrets.ORO_DEPLOY_KEY }}
          ORO_HOST: 10.50.40.100
          DIAG_B64: 
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$ORO_DEPLOY_KEY" > "$HOME/.ssh/oro_deploy"
          chmod 600 "$HOME/.ssh/oro_deploy"
          trap 'rm -f "$HOME/.ssh/oro_deploy"' EXIT

          ssh -i "$HOME/.ssh/oro_deploy" -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
              ubuntu@"$ORO_HOST" "DIAG_B64='$DIAG_B64' bash -s" <<'REMOTE'
            set -euo pipefail
            cd /opt/oro
            echo "===== .env auth-relevant ====="
            grep -E '^(AUTH_URL|APP_URL|AUTH_SECRET|AUTH_TRUST_HOST|NEXTAUTH)' .env | sed -E 's/(SECRET=).*/\1<redacted>/'
            echo "===== user diagnostic ====="
            # Pipe decoded JS into the web container's WORKDIR so node resolves
            # @prisma/client / argon2 from the app's node_modules.
            echo "$DIAG_B64" | base64 -d | docker compose exec -T web sh -c 'cat > ./oro_diag.js && node ./oro_diag.js; rm -f ./oro_diag.js'
          REMOTE
