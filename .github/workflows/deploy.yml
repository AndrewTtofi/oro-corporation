name: Deploy to production

# Deploys the platform to the production host via the self-hosted runner over
# the private network. The runner SSHes to the box and runs deploy/deploy-oro.sh
# (git pull → pull prebuilt image → up → health gate). No public SSH involved.
#
# Triggers:
#   • after CI succeeds on main (deploys the freshly built image)
#   • manual (Actions → Deploy to production → Run workflow)
#
# Required repo secret:
#   ORO_DEPLOY_KEY  — private SSH key authorized on the production box (ubuntu@10.50.40.100)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-oro
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production (self-hosted → 10.50.40.100)
    runs-on: [self-hosted, oro-ci]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy over the private network
        env:
          ORO_DEPLOY_KEY: ${{ secrets.ORO_DEPLOY_KEY }}
          ORO_HOST: 10.50.40.100
          # Managed config injected into the box .env by deploy-oro.sh.
          SUPER_ADMIN_EMAILS: ${{ secrets.SUPER_ADMIN_EMAILS }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
          # White-label firm name → applied to the app's branding (single source
          # of truth; also used by the deploy notifier). Empty → neutral wording.
          COMPANY_NAME: ${{ vars.COMPANY_NAME }}
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$ORO_DEPLOY_KEY" > "$HOME/.ssh/oro_deploy"
          chmod 600 "$HOME/.ssh/oro_deploy"
          trap 'rm -f "$HOME/.ssh/oro_deploy"' EXIT

          # Pass secret-backed config to the remote shell; deploy-oro.sh reads
          # them from env and writes them into /opt/oro/.env. GitHub masks values.
          ssh -i "$HOME/.ssh/oro_deploy" -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
              ubuntu@"$ORO_HOST" \
              "SUPER_ADMIN_EMAILS='${SUPER_ADMIN_EMAILS}' SUPER_ADMIN_PASSWORD='${SUPER_ADMIN_PASSWORD}' COMPANY_NAME='${COMPANY_NAME}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/oro
          git fetch --depth=1 origin main
          git reset --hard origin/main
          bash deploy/deploy-oro.sh
          REMOTE
