name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  changelog:
    name: Changelog updated
    runs-on: ubuntu-latest
    # Dependabot PRs only touch dependency manifests/lockfiles and never edit
    # CHANGELOG.md, so the changelog gate would block every bump. Skip it for
    # dependabot; human PRs still require a changelog entry.
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md is in this PR's diff
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed=$(git diff --name-only "$base"...HEAD)
          echo "Files changed in this PR:"
          echo "$changed"
          non_doc=$(echo "$changed" | grep -Ev '^(docs/|\.github/pull_request_template\.md$|CHANGELOG\.md$)' || true)
          if [ -z "$non_doc" ]; then
            echo "Docs-only PR — changelog requirement waived."
            exit 0
          fi
          if echo "$changed" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated."
            exit 0
          fi
          echo "::error::CHANGELOG.md was not updated. Add an entry under the Unreleased section in CHANGELOG.md before merging."
          exit 1

  unit:
    name: Unit tests + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      - run: npx prisma generate
      - run: npx prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit

  integration:
    name: Integration tests (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run test:integration

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      - name: Prepare .env
        run: |
          cp .env.example .env
          echo "AUTH_SECRET=$(openssl rand -base64 48)" >> .env
          echo "ENCRYPTION_KEY_B64=$(openssl rand -base64 32)" >> .env
          echo "POSTGRES_USER=oro" >> .env
          echo "POSTGRES_PASSWORD=oro" >> .env
          echo "POSTGRES_DB=oro" >> .env
          echo "APP_URL=http://localhost" >> .env
          echo "AUTH_URL=http://localhost" >> .env
          echo "ALLOW_TEST_RESET=1" >> .env
          echo "SMTP_FROM=no-reply@oro.local" >> .env
          mkdir -p public
      - name: Start dev stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
          for i in $(seq 1 60); do
            if curl -fsS http://localhost/api/health > /dev/null; then echo ready; break; fi
            sleep 2
          done
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Dump container logs on failure
        if: failure()
        run: |
          for svc in web worker db mail proxy; do
            echo "===== docker logs $svc ====="
            docker compose -f docker-compose.yml -f docker-compose.dev.yml logs --tail=200 "$svc" || true
          done
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    # No `needs:` — runs in parallel with the test jobs. The image content is the
    # same regardless; the deploy is gated on the whole CI run succeeding, so a
    # build for a test-failing commit is never deployed.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          base="ghcr.io/${owner_lc}/${repo_lc}"
          tags="${base}:sha-${GITHUB_SHA::7}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${base}:latest"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/}"
            tags="${tags},${base}:${v}"
          fi
          echo "tags=${tags}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
