name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  changelog:
    name: Changelog updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md is in this PR's diff
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed=$(git diff --name-only "$base"...HEAD)
          echo "Files changed in this PR:"
          echo "$changed"
          # Docs-only PRs are exempt — if every change is under docs/ or in this skip-list,
          # we don't require a changelog entry.
          non_doc=$(echo "$changed" | grep -Ev '^(docs/|\.github/pull_request_template\.md$|CHANGELOG\.md$)' || true)
          if [ -z "$non_doc" ]; then
            echo "Docs-only PR — changelog requirement waived."
            exit 0
          fi
          if echo "$changed" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated."
            exit 0
          fi
          echo "::error::CHANGELOG.md was not updated. Add an entry under the Unreleased section in CHANGELOG.md before merging."
          exit 1

  validate:
    name: Lint + typecheck + prisma validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      - run: npx prisma generate
      - run: npx prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - run: npm run lint
      - run: npm run typecheck

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          base="ghcr.io/${owner_lc}/${repo_lc}"
          tags="${base}:sha-${GITHUB_SHA::7}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${base}:latest"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/}"
            tags="${tags},${base}:${v}"
          fi
          echo "tags=${tags}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
