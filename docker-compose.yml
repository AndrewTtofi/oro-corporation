# ORO — production compose. Brings up proxy + web + worker + db on one host.
# `docker compose up -d` is the only command needed on a fresh Lightsail box,
# once .env is in place and DNS points at the box.

x-image: &oro-image
  image: ${ORO_IMAGE:-oro:local}
  build:
    context: .
    dockerfile: Dockerfile

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge, app]
    depends_on:
      web:
        condition: service_healthy
    environment:
      ORO_DOMAIN: ${ORO_DOMAIN:-oro.local}
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 60s
      timeout: 5s
      retries: 3

  web:
    <<: *oro-image
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - oro_docs:/data/docs
    networks: [app, dbnet]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  worker:
    <<: *oro-image
    restart: unless-stopped
    env_file: .env
    command: ["node", "dist-worker/worker/index.js"]
    environment:
      NODE_ENV: production
    volumes:
      - oro_docs:/data/docs:ro
    networks: [app, dbnet]
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node dist-worker/worker/index.js' > /dev/null"]
      interval: 60s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oro}
      POSTGRES_DB: ${POSTGRES_DB:-oro}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - oro_pgdata:/var/lib/postgresql/data
    networks: [dbnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oro} -d ${POSTGRES_DB:-oro}"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  edge:    # proxy ↔ internet
  app:     # proxy ↔ web ↔ worker
  dbnet:   # web/worker ↔ db (no proxy access)

volumes:
  oro_pgdata:
  oro_docs:
  caddy_data:
  caddy_config:
